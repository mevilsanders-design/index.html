<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CRM: Сбор заказов</title>
    <style>
      body { font-family: Arial, sans-serif; max-width: 800px; margin: 20px auto; padding: 0 10px; }
      nav button { margin-right: 8px; padding: 8px 12px; cursor: pointer; border: none; background: #f0f0f0; }
      .section { display: none; }
      .active { display: block; }
      table { width: 100%; border-collapse: collapse; margin-top: 12px; }
      th, td { border: 1px solid #ccc; padding: 6px 8px; text-align: left; }
      input, select { padding: 6px; margin-right: 6px; width: auto; }
      button.del { background: #dc3545; color: white; border: none; padding: 4px 8px; cursor: pointer; }
      button.edit { background: #007bff; color: white; border: none; padding: 4px 8px; cursor: pointer; }
      .status-new { color: #007bff; font-weight: bold; }
      .status-sent { color: #28a745; font-weight: bold; }
      .status-confirmed { color: #ffc107; font-weight: bold; }

      .modal-overlay {
        position: fixed; top: 0; left: 0; right: 0; bottom: 0;
        background: rgba(0,0,0,0.5);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 100;
      }
      .modal {
        background: white; padding: 20px; border-radius: 8px;
        width: 90%; max-width: 400px;
      }
    </style>
  </head>
  <body>
    <h1>CRM: Сбор заказов</h1>
    <nav>
      <button onclick="showSection('clients')">Клиенты</button>
      <button onclick="showSection('products')">Товары</button>
      <button onclick="showSection('orders')">Заказы</button>
      <button onclick="showSection('create-order')">Новый заказ</button>
    </nav>

    <!-- Клиенты -->
    <div id="clients" class="section active">
      <h2>Клиенты</h2>
      <input id="client-name" placeholder="Название клиента" />
      <input id="client-address" placeholder="Адрес" />
      <button onclick="addClient()">Добавить клиента</button>
      <table>
        <thead><tr><th>Клиент</th><th>Адрес</th><th>Действия</th></tr></thead>
        <tbody id="clients-list"></tbody>
      </table>
    </div>

    <!-- Товары -->
    <div id="products" class="section">
      <h2>Товары</h2>
      <input id="product-name" placeholder="Наименование товара" />
      <input id="product-price" type="number" placeholder="Цена" step="0.01" />
      <button onclick="addProduct()">Добавить товар</button>
      <table>
        <thead><tr><th>Товар</th><th>Цена</th><th>Действия</th></tr></thead>
        <tbody id="products-list"></tbody>
      </table>
    </div>

    <!-- Модалка редактирования товара -->
    <div id="edit-product-modal" class="modal-overlay">
      <div class="modal">
        <h3>Редактировать товар</h3>
        <input id="edit-product-name" placeholder="Наименование" />
        <input id="edit-product-price" type="number" step="0.01" placeholder="Цена" />
        <br><br>
        <button onclick="saveEditedProduct()" style="background:#28a745;color:white;padding:8px 16px;">Сохранить</button>
        <button onclick="closeEditProductModal()" style="margin-left:8px;">Отмена</button>
      </div>
    </div>

    <!-- Заказы (список) -->
    <div id="orders" class="section">
      <h2>Заказы</h2>
      <table>
        <thead>
          <tr>
            <th>№</th>
            <th>Клиент</th>
            <th>Дата</th>
            <th>Сумма</th>
            <th>Статус</th>
            <th>Действия</th>
          </tr>
        </thead>
        <tbody id="orders-list"></tbody>
      </table>
    </div>

    <!-- Новый/редактируемый заказ -->
    <div id="create-order" class="section">
      <h2 id="order-form-title">Новый заказ</h2>
      <select id="order-client"></select>
      <hr />
      <div id="order-items"></div>
      <button onclick="addOrderItemRow()">+ Добавить позицию</button>
      <hr />
      <label>Статус:
        <select id="order-status">
          <option value="new">Новый</option>
          <option value="sent">Отправлен</option>
          <option value="confirmed">Подтверждён</option>
        </select>
      </label>
      <br><br>
      <button id="save-order-btn" onclick="saveOrder()" style="background:#28a745;color:white;padding:10px 16px;">Сохранить заказ</button>
      <button id="cancel-order-btn" onclick="showSection('orders')" style="margin-left:8px;">Отмена</button>
    </div>

    <script>
      // --- Инициализация ---
      if (!localStorage.getItem('crm-clients')) localStorage.setItem('crm-clients', JSON.stringify([]));
      if (!localStorage.getItem('crm-products')) localStorage.setItem('crm-products', JSON.stringify([]));
      if (!localStorage.getItem('crm-orders')) localStorage.setItem('crm-orders', JSON.stringify([]));

      function getClients() { return JSON.parse(localStorage.getItem('crm-clients')); }
      function getProducts() { return JSON.parse(localStorage.getItem('crm-products')); }
      function getOrders() { return JSON.parse(localStorage.getItem('crm-orders')); }

      function saveClients(arr) { localStorage.setItem('crm-clients', JSON.stringify(arr)); }
      function saveProducts(arr) { localStorage.setItem('crm-products', JSON.stringify(arr)); }
      function saveOrders(arr) { localStorage.setItem('crm-orders', JSON.stringify(arr)); }

      let editingOrderId = null;
      let editingProductId = null;

      // --- Навигация ---
      function showSection(id) {
        document.querySelectorAll('.section').forEach(el => el.classList.remove('active'));
        const el = document.getElementById(id);
        if (!el) return;
        el.classList.add('active');
        if (id === 'clients') renderClients();
        if (id === 'products') renderProducts();
        if (id === 'orders') renderOrders();
        if (id === 'create-order') {
          renderCreateOrder();
          document.getElementById('order-form-title').textContent = editingOrderId ? 'Редактирование заказа' : 'Новый заказ';
        }
      }

      // --- Клиенты ---
      function addClient() {
        const name = document.getElementById('client-name').value.trim();
        const address = document.getElementById('client-address').value.trim();
        if (!name) return alert('Укажите название клиента');
        const clients = getClients();
        clients.push({ id: Date.now(), name, address });
        saveClients(clients);
        document.getElementById('client-name').value = '';
        document.getElementById('client-address').value = '';
        renderClients();
      }
      function deleteClient(id) {
        if (!confirm('Удалить клиента?')) return;
        const clients = getClients().filter(c => c.id != id);
        saveClients(clients);
        renderClients();
      }
      function renderClients() {
        const list = document.getElementById('clients-list');
        list.innerHTML = '';
        getClients().forEach(c => {
          const tr = document.createElement('tr');
          tr.innerHTML = `<td>${c.name}</td><td>${c.address}</td><td><button class="del" onclick="deleteClient(${c.id})">Удалить</button></td>`;
          list.appendChild(tr);
        });
      }

      // --- Товары ---
      function addProduct() {
        const name = document.getElementById('product-name').value.trim();
        const priceStr = document.getElementById('product-price').value;
        const price = parseFloat(priceStr);
        if (!name || isNaN(price)) return alert('Заполните название и цену товара');
        const products = getProducts();
        products.push({ id: Date.now(), name, price });
        saveProducts(products);
        document.getElementById('product-name').value = '';
        document.getElementById('product-price').value = '';
        renderProducts();
      }
      function deleteProduct(id) {
        if (!confirm('Удалить товар? Позиции в старых заказах останутся.')) return;
        const products = getProducts().filter(p => p.id != id);
        saveProducts(products);
        renderProducts();
      }
      function editProduct(id) {
        editingProductId = id;
        const product = getProducts().find(p => p.id == id);
        if (!product) { alert('Товар не найден'); return; }
        document.getElementById('edit-product-name').value = product.name;
        document.getElementById('edit-product-price').value = product.price;
        document.getElementById('edit-product-modal').style.display = 'flex';
      }
      function closeEditProductModal() {
        editingProductId = null;
        document.getElementById('edit-product-modal').style.display = 'none';
      }
      function saveEditedProduct() {
        const name = document.getElementById('edit-product-name').value.trim();
        const priceStr = document.getElementById('edit-product-price').value;
        const price = parseFloat(priceStr);
        if (!name || isNaN(price)) {
          return alert('Заполните название и корректную цену товара');
        }
        const products = getProducts();
        const idx = products.findIndex(p => p.id == editingProductId);
        if (idx >= 0) {
          products[idx] = { ...products[idx], name, price };
          saveProducts(products);
          closeEditProductModal();
          renderProducts();
          alert('Товар обновлён!');
        } else {
          alert('Не удалось сохранить: товар не найден');
        }
      }
      function renderProducts() {
        const list = document.getElementById('products-list');
        list.innerHTML = '';
        getProducts().forEach(p => {
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td>${p.name}</td>
            <td>${p.price.toFixed(2)} ₽</td>
            <td>
              <button class="edit" onclick="editProduct(${p.id})">Редактировать</button>
              <button class="del" onclick="deleteProduct(${p.id})">Удалить</button>
            </td>`;
          list.appendChild(tr);
        });
      }

      // --- Заказы ---
      function renderOrders() {
        const list = document.getElementById('orders-list');
        list.innerHTML = '';
        getOrders().forEach((o, idx) => {
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td>${idx + 1}</td>
            <td>${o.clientName}</td>
            <td>${o.date}</td>
            <td>${o.total.toFixed(2)} ₽</td>
            <td class="status-${o.status}">${o.status}</td>
            <td>
              <button class="edit" onclick="editOrder(${o.id})">Редактировать</button>
              <button class="del" onclick="deleteOrder(${o.id})">Удалить</button>
            </td>`;
          list.appendChild(tr);
        });
      }
      function deleteOrder(id) {
        if (!confirm('Удалить заказ?')) return;
        const orders = getOrders().filter(o => o.id != id);
        saveOrders(orders);
        renderOrders();
      }
      function editOrder(id) {
        editingOrderId = id;
        showSection('create-order');
      }
      function renderCreateOrder() {
        const select = document.getElementById('order-client');
        select.innerHTML = '';
        const clients = getClients();
        clients.forEach(c => {
          const opt = document.createElement('option');
          opt.value = c.id;
          opt.textContent = c.name;
          select.appendChild(opt);
        });
        const container = document.getElementById('order-items');
        container.innerHTML = '';
        if (editingOrderId !== null) {
          const order = getOrders().find(o => o.id == editingOrderId);
          if (!order) { alert('Заказ не найден'); showSection('orders'); return; }
          document.getElementById('order-client').value = order.clientId;
          document.getElementById('order-status').value = order.status;
          order.items.forEach(item => {
            const row = createOrderItemRow(item.productId, item.qty);
            container.appendChild(row);
          });
        } else {
          addOrderItemRow();
        }
      }
      function createOrderItemRow(productId = '', qty = 1) {
        const row = document.createElement('div');
        row.innerHTML = `
          <select class="order-product"></select>
          <input type="number" class="order-qty" placeholder="Кол-во" min="1" value="${qty}" />
          <button onclick="this.parentElement.remove()" style="color:red">×</button>`;
        const products = getProducts();
        const sel = row.querySelector('select');
        sel.innerHTML = '<option value="">-- выберите товар --</option>';
        products.forEach(p => {
          const opt = document.createElement('option');
          opt.value = p.id;
          opt.textContent = `${p.name} (${p.price.toFixed(2)} ₽)`;
          sel.appendChild(opt);
        });
        if (productId) sel.value = productId;
        sel.addEventListener('change', recalcTotal);
        row.querySelector('.order-qty').addEventListener('input', recalcTotal);
        return row;
      }
      function addOrderItemRow() {
        const container = document.getElementById('order-items');
        container.appendChild(createOrderItemRow());
      }
      function recalcTotal() {
        // Заглушка: здесь можно добавить живой пересчёт суммы
        console.log('Пересчёт суммы...');
      }
      function saveOrder() {
        const clientId = document.getElementById('order-client').value;
        if (!clientId) return alert('Выберите клиента');
        const client = getClients().find(c => c.id == clientId);
        const rows = document.querySelectorAll('#order-items > div');
        let total = 0;
        const items = [];
        rows.forEach(row => {
          const prodSel = row.querySelector('select');
          const qtyInput = row.querySelector('.order-qty');
          if (!prodSel.value || !qtyInput.value) return;
          const product = getProducts().find(p => p.id == prodSel.value);
          const qty = parseInt(qtyInput.value, 10);
          const lineTotal = product.price * qty;
          total += lineTotal;
          items.push({
            productId: product.id,
            productName: product.name,
            qty,
            price: product.price,
            total: lineTotal
          });
        });
        if (
